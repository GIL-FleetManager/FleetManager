name: Go Service CI

on:
    push:
        paths:
            - "services/localization-service/**"

jobs:
    test-go:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25.5"
                  cache-dependency-path: services/localization-service/go.sum

            - name: Install Dependencies
              working-directory: ./services/localization-service
              run: go mod download

            - name: Run Tests
              working-directory: ./services/localization-service
              run: go test -v ./...
