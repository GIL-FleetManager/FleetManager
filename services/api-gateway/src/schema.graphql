type Vehicule {
  id: ID!
  immatriculation: String
  marque: String
  modele: String
  statut: String
  location: GpsPoint
}

type GpsPoint {
  latitude: Float
  longitude: Float
  speed: Float
  timestamp: String
}

type Conducteur {
  id: ID!
  nom: String!
  prenom: String!
  email: String!
  telephone: String
  numero_permis: String!
  date_expiration_permis: String!
  statut: String
  created_at: String
  updated_at: String
}

type Intervention {
  id: ID!
  vehicule_id: String!
  technicien_id: String
  type_intervention: String!
  date_planifiee: String!
  date_realisation: String
  statut: String!
  description: String
  created_at: String
  updated_at: String
}

type Query {
  vehicules: [Vehicule]
  getVehicule(id: ID!): Vehicule

  conducteurs: [Conducteur]
  getConducteur(id: ID!): Conducteur

  interventions: [Intervention]
  intervention(id: ID!): Intervention

  getLastLocation(vehicleId: ID!): GpsPoint

  health: String
}

type Mutation {
  createVehicule(
    immatriculation: String!
    marque: String!
    modele: String!
    statut: String!
  ): Vehicule

  updateVehicule(
    id: ID!
    immatriculation: String
    marque: String
    modele: String
    statut: String
  ): Vehicule

  deleteVehicule(id: ID!): Boolean

  createConducteur(
    nom: String!
    prenom: String!
    email: String!
    telephone: String
    numero_permis: String!
    date_expiration_permis: String!
    statut: String
  ): Conducteur

  updateConducteur(
    id: ID!
    nom: String
    prenom: String
    email: String
    telephone: String
    numero_permis: String
    date_expiration_permis: String
    statut: String
  ): Conducteur

  deleteConducteur(id: ID!): Boolean

  createIntervention(
    vehicule_id: String!
    technicien_id: String
    type_intervention: String!
    date_planifiee: String!
    date_realisation: String
    statut: String
    description: String
  ): Intervention

  updateIntervention(
    id: ID!
    vehicule_id: String
    technicien_id: String
    type_intervention: String
    date_planifiee: String
    date_realisation: String
    statut: String
    description: String
  ): Intervention

  deleteIntervention(id: ID!): Boolean
}
