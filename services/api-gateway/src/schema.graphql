type Vehicle {
  id: ID!
  plateNumber: String
  brand: String
  model: String
  status: String
  location: GpsPoint
}

type GpsPoint {
  latitude: Float
  longitude: Float
  speed: Float
  timestamp: String
}

type Query {
  vehicles: [Vehicle]
  getVehicle(id: ID!): Vehicle
  health: String
}

type Mutation {
  createVehicle(
    plateNumber: String!
    brand: String!
    model: String!
    status: String!
  ): Vehicle
}