apiVersion: apps/v1
kind: Deployment
metadata:
  name: localization-service
  namespace: fleet-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localization-service
  template:
    metadata:
      labels:
        app: localization-service
    spec:
      containers:
        - name: localization-service
          image: fleetmanager-localization-service:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: localization-service
  namespace: fleet-manager
spec:
  type: LoadBalancer
  selector:
    app: localization-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30084
