apiVersion: apps/v1
kind: Deployment
metadata:
  name: localization-service
  namespace: fleet-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localization-service
  template:
    metadata:
      labels:
        app: localization-service
    spec:
      containers:
        - name: localization-service
          image: fleetmanager-localization-service:latest
          imagePullPolicy: Never
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: global-fleet-config
          env:
            - name: KAFKA_BROKER
              value: "fleet-kafka-kafka-bootstrap:9092"
            - name: APP_ENV
              value: "dev"
            - name: DATABASE_URL
              value: "postgresql://postgres:$(DB_PASSWORD)@fleet-db-postgresql.database.svc.cluster.local:5432/localization_db?serverVersion=16.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: localization-service
  namespace: fleet-manager
spec:
  type: ClusterIP
  selector:
    app: localization-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
