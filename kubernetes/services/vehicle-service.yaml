apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-service
  namespace: fleet-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vehicle-service
  template:
    metadata:
      labels:
        app: vehicle-service
    spec:
      containers:
        - name: vehicle-service
          image: fleetmanager-vehicle-service:latest
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: global-fleet-config
          env:
            - name: CORS_ALLOW_ORIGIN
              value: "^.*$"
            - name: APP_ENV
              value: "dev"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fleet-db-postgresql
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://postgres:$(DB_PASSWORD)@fleet-db-postgresql.database.svc.cluster.local:5432/vehicle_db?serverVersion=16.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: vehicle-service
  namespace: fleet-manager
spec:
  type: ClusterIP
  selector:
    app: vehicle-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-kafka-consumer
  namespace: fleet-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vehicle-kafka-consumer
  template:
    metadata:
      labels:
        app: vehicle-kafka-consumer
    spec:
      containers:
        - name: kafka-consumer
          image: fleetmanager-vehicle-service:latest 
          imagePullPolicy: Never
          command: ["php", "bin/console", "app:kafka-consume-driver"]
          envFrom:
            - configMapRef:
                name: global-fleet-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fleet-db-postgresql
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://postgres:$(DB_PASSWORD)@fleet-db-postgresql.database.svc.cluster.local:5432/vehicle_db?serverVersion=16.0.0"
