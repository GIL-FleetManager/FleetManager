apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: fleet-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
        - name: event-service
          image: fleetmanager-event-service:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: event-service
  namespace: fleet-manager
spec:
  type: LoadBalancer
  selector:
    app: event-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30085
