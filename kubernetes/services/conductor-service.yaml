apiVersion: apps/v1
kind: Deployment
metadata:
  name: conductor-service
  namespace: fleet-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conductor-service
  template:
    metadata:
      labels:
        app: conductor-service
    spec:
      containers:
        - name: conductor-service
          image: fleetmanager-conductor-service:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          ports:
            - containerPort: 80
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: fleet-config
                  key: DATABASE_HOST
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: fleet-config
                  key: REDIS_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: conductor-service
  namespace: fleet-manager
spec:
  type: LoadBalancer
  selector:
    app: conductor-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30082
