apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: fleet-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: fleetmanager-api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: KEYCLOAK_URL
              value: "http://keycloak-service:8080"
            - name: VEHICLE_SERVICE_URL
              value: "http://vehicle-service:80"
            - name: CONDUCTOR_SERVICE_URL
              value: "http://conductor-service:80"
            - name: MAINTENANCE_SERVICE_URL
              value: "http://maintenance-service:80"
            - name: EVENT_SERVICE_URL
              value: "http://event-service:8000"
            - name: LOCALIZATION_SERVICE_URL
              value: "http://localization-service:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: fleet-manager
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8000
      nodePort: 30080
